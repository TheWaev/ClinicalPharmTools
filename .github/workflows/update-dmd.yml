name: Update dm+d data

# Downloads the latest NHS dm+d from TRUD, converts it to the slim JSON the app
# bundles, and commits it back to the repo. dm+d publishes weekly, so this runs
# on a weekly schedule; it can also be run on demand from the Actions tab.
#
# Requires a repository secret `TRUD_API_KEY` (a TRUD account subscribed to
# item 24). Without it, build:dmd no-ops, nothing changes, and nothing is
# committed.

on:
  schedule:
    - cron: '0 7 * * 2' # Tuesdays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write # commit the refreshed data file
  actions: write # trigger the deploy workflow afterwards

concurrency:
  group: update-dmd
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download dm+d from TRUD and build JSON
        env:
          TRUD_API_KEY: ${{ secrets.TRUD_API_KEY }}
        run: npm run build:dmd

      - name: Commit refreshed data if it changed
        id: commit
        run: |
          if git diff --quiet -- src/tools/repeat-sync/data/dmd.json; then
            echo "dm+d data unchanged — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/tools/repeat-sync/data/dmd.json
            git commit -m "chore(data): refresh dm+d from TRUD [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy the refreshed data
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
